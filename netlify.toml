[build]
  command = "npm run build"
  publish = "build"

[functions]

    [functions.node_wrapper]
    external_node_modules = [
      "module-one",
      "module-two"
    ]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"
